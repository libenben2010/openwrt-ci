name: AX5 IPQ60xx Cloud Build

on:
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: "OpenWrt source repo"
        required: true
        default: "https://github.com/LiBwrt/openwrt-6.x.git"
      openwrt_branch:
        description: "OpenWrt source branch"
        required: true
        default: "main-nss"
      config_path:
        description: "Config path in THIS repo"
        required: true
        default: "configs/ipq60xx-ax5-fixed.config"
      upload_release:
        description: "Upload firmware to GitHub Release (true/false)"
        required: true
        default: "false"

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Validate config exists
        run: |
          test -f "${{ github.event.inputs.config_path }}" || (echo "ERROR: Config not found" && exit 1)

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 -b "${{ github.event.inputs.openwrt_branch }}" "${{ github.event.inputs.openwrt_repo }}" openwrt
