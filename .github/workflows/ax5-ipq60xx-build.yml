name: AX5 IPQ60xx Cloud Build

on:
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: "OpenWrt source repo"
        required: true
        default: "https://github.com/LiBwrt/openwrt-6.x.git"
      openwrt_branch:
        description: "OpenWrt source branch"
        required: true
        default: "main-nss"
      config_path:
        description: "Config path in THIS repo"
        required: true
        default: "configs/ipq60xx-ax5-fixed.config"
      upload_release:
        description: "Upload firmware to GitHub Release (true/false)"
        required: true
        default: "false"

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Validate config exists
        run: |
          test -f "${{ github.event.inputs.config_path }}" || \
          (echo "ERROR: Config not found: ${{ github.event.inputs.config_path }}" && exit 1)

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-distutils \
            rsync unzip zlib1g-dev file wget

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 \
            -b "${{ github.event.inputs.openwrt_branch }}" \
            "${{ github.event.inputs.openwrt_repo }}" \
            openwrt

      - name: Prepare feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply config
        run: |
          cp "${{ github.event.inputs.config_path }}" openwrt/.config
          sed -i 's/\r$//' openwrt/.config

      - name: Validate target profile (AX5 hard check)
        working-directory: openwrt
        run: |
          set -e
          make defconfig

          echo "======= key configs ======="
          grep -E \
            "CONFIG_TARGET_qualcommax|CONFIG_TARGET_qualcommax_ipq60xx|\
CONFIG_TARGET_MULTI_PROFILE|\
CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_.*=y|\
ATH11K_MEM_PROFILE|IPQ_MEM_PROFILE|\
KERNEL_IPQ_MEM_PROFILE|qca-nss" \
            .config || true
          echo "==========================="

          # 源码必须包含 redmi_ax5 设备定义
          if ! grep -r "DEVICE.*redmi_ax5" target/linux/qualcommax 2>/dev/null | grep -q "redmi_ax5"; then
            echo "ERROR: 当前源码分支不包含 redmi_ax5 设备定义"
            exit 2
          fi

          # 必须命中 AX5
          grep -q "^CONFIG_TARGET_qualcommax=y$" .config
          grep -q "^CONFIG_TARGET_qualcommax_ipq60xx=y$" .config
          grep -q "^CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_redmi_ax5=y$" .config

          # 禁止回落到 mango-dvk
          if grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_8devices_mango-dvk=y" .config; then
            echo "ERROR: 落到了错误的 profile (mango-dvk)"
            exit 1
          fi

          # 内存档位必须 256
          grep -q "^CONFIG_ATH11K_MEM_PROFILE_256M=y$" .config
          grep -q "^CONFIG_IPQ_MEM_PROFILE_256=y$" .config
          grep -q "^CONFIG_KERNEL_IPQ_MEM_PROFILE=256$" .config

          echo "✅ 校验通过：AX5 + 256MB + 单机型"

      - name: Upload resolved .config
        uses: actions/upload-artifact@v4
        with:
          name: resolved-config
          path: openwrt/.config

      - name: Download sources
        working-directory: openwrt
        run: make download -j8

      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp -r openwrt/bin/targets/qualcommax/ipq60xx artifacts/ || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ax5-ipq60xx-firmware
          path: artifacts/

      - name: Release (optional)
        if: ${{ github.event.inputs.upload_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ax5-${{ github.run_number }}
          name: AX5 build #${{ github.run_number }}
          files: |
            artifacts/**/*
