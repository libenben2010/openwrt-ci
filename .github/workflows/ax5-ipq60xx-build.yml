name: AX5 IPQ60xx Cloud Build

on:
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: "OpenWrt source repo"
        required: true
        default: "https://github.com/qosmio/openwrt-ipq.git"
      openwrt_branch:
        description: "OpenWrt source branch"
        required: true
        default: "main"
      config_path:
        description: "Config path in THIS repo"
        required: true
        default: "configs/ipq60xx-6.12-wifi.config"
      upload_release:
        description: "Upload to GitHub Release"
        required: true
        default: "false"

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Validate config exists
        run: |
          test -f "${{ github.event.inputs.config_path }}" || (echo "Config not found" && exit 1)

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 -b "${{ github.event.inputs.openwrt_branch }}" "${{ github.event.inputs.openwrt_repo }}" openwrt

      - name: Prepare feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply config
        run: |
          cp "${{ github.event.inputs.config_path }}" openwrt/.config
          sed -i 's/\r$//' openwrt/.config

      - name: Defconfig check
        working-directory: openwrt
        run: |
          make defconfig
          grep -E "CONFIG_TARGET_qualcommax|CONFIG_TARGET_qualcommax_ipq60xx|redmi_ax5|ATH11K_MEM_PROFILE|IPQ_MEM_PROFILE|KERNEL_IPQ_MEM_PROFILE" .config || true

      - name: Download sources
        working-directory: openwrt
        run: make download -j8

      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp -r openwrt/bin/targets/qualcommax/ipq60xx artifacts/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ax5-ipq60xx-firmware
          path: artifacts/

      - name: Release (optional)
        if: ${{ github.event.inputs.upload_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ax5-${{ github.run_number }}
          name: AX5 build #${{ github.run_number }}
          files: |
            artifacts/**/*
