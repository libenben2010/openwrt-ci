name: AX5 IPQ60xx Cloud Build

on:
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: "OpenWrt source repo"
        required: true
        default: "https://github.com/LiBwrt/openwrt-6.x.git"
      openwrt_branch:
        description: "OpenWrt source branch"
        required: true
        default: "main-nss"
      config_path:
        description: "Config path in THIS repo"
        required: true
        default: "configs/ipq60xx-ax5-fixed.config"
      upload_release:
        description: "Upload firmware to GitHub Release (true/false)"
        required: true
        default: "false"

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    timeout-minutes: 360

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Validate config exists
        run: |
          test -f "${{ github.event.inputs.config_path }}" || \
          (echo "ERROR: Config not found" && exit 1)

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-distutils \
            rsync unzip zlib1g-dev file wget

      - name: Clone OpenWrt source
        timeout-minutes: 15
        run: |
          git clone \
            --depth=1 \
            --filter=blob:none \
            --no-tags \
            -b "${{ github.event.inputs.openwrt_branch }}" \
            "${{ github.event.inputs.openwrt_repo }}" \
            openwrt
          grep -q "redmi_ax5" openwrt/target/linux/qualcommax/image/ipq60xx.mk && \
            echo "✅ redmi_ax5 found in source" || \
            (echo "ERROR: redmi_ax5 not in this branch" && exit 1)

      - name: Prepare feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply config
        working-directory: openwrt
        run: |
          # 第一阶段：只写设备行，强制覆盖 mango-dvk 的 default y
          echo "CONFIG_TARGET_qualcommax=y" > .config
          echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config
          echo "# CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_8devices_mango-dvk is not set" >> .config
          echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_redmi_ax5=y" >> .config
          
          make defconfig
          
          # 第一阶段验证
          grep -q 'CONFIG_TARGET_PROFILE="DEVICE_redmi_ax5"' .config || \
            (echo "ERROR: 第一阶段设备选择失败" && grep "TARGET_PROFILE" .config && exit 1)
          echo "✅ 第一阶段 AX5 选中"
          
          # 第二阶段：叠加包配置（过滤掉 TARGET 行避免冲突）
          grep -v "^CONFIG_TARGET_" "$GITHUB_WORKSPACE/${{ github.event.inputs.config_path }}" | \
            grep -v "^# CONFIG_TARGET_" >> .config
          
          # 第二阶段 defconfig 融合包配置
          make defconfig
          
          # 强制恢复 AX5（defconfig 会再次重置）
          sed -i 's|CONFIG_TARGET_PROFILE=.*|CONFIG_TARGET_PROFILE="DEVICE_redmi_ax5"|' .config
          sed -i 's|CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_8devices_mango-dvk=y|# CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_8devices_mango-dvk is not set|g' .config
          grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_redmi_ax5=y" .config || \
            echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_redmi_ax5=y" >> .config
          
          sed -i 's/\r$//' .config
          echo "✅ Apply config 完成"

      - name: Validate target profile (AX5 hard check)
        working-directory: openwrt
        run: |
          # 注意：这里不再运行 make defconfig，直接检查已有 .config
          set -e
          echo "======= key configs ======="
          grep -E "TARGET_PROFILE|DEVICE_redmi_ax5|DEVICE_8devices|ATH11K_MEM_PROFILE|IPQ_MEM_PROFILE|KERNEL_IPQ_MEM_PROFILE" .config || true
          echo "==========================="
          
          grep -q 'CONFIG_TARGET_PROFILE="DEVICE_redmi_ax5"' .config || \
            (echo "ERROR: AX5 未被选中" && grep "TARGET_PROFILE" .config && exit 1)
          
          if grep -q 'CONFIG_TARGET_PROFILE="DEVICE_8devices_mango-dvk"' .config; then
            echo "ERROR: 落到了错误的 profile (mango-dvk)"
            exit 1
          fi
          
          grep -q "^CONFIG_ATH11K_MEM_PROFILE_256M=y$" .config
          grep -q "^CONFIG_IPQ_MEM_PROFILE_256=y$" .config
          grep -q "^CONFIG_KERNEL_IPQ_MEM_PROFILE=256$" .config
          
          echo "✅ 校验通过：AX5 + 256MB"

      - name: Upload resolved .config
        uses: actions/upload-artifact@v4
        with:
          name: resolved-config
          path: openwrt/.config

      - name: Download sources
        working-directory: openwrt
        run: make download -j8

      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp -r openwrt/bin/targets/qualcommax/ipq60xx artifacts/ || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ax5-ipq60xx-firmware
          path: artifacts/

      - name: Release (optional)
        if: ${{ github.event.inputs.upload_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ax5-${{ github.run_number }}
          name: AX5 build #${{ github.run_number }}
          files: |
            artifacts/**/*
